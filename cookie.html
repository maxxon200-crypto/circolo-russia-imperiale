<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <title>Cookie</title>
</head>
<body>
  <h1>Cookie Policy</h1>

  <!-- NON modificare questo link -->
  <a href="https://www.iubenda.com/privacy-policy/10834393/cookie-policy"
     class="iubenda-black iubenda-noiframe iubenda-embed"
     title="Cookie Policy">Cookie Policy</a>

  <!-- Stesso script se non sai dove mettere il loader nel sito -->
  <script type="text/javascript">
  (function (w,d) {
    var loader = function () {
      var s = d.createElement("script"),
          tag = d.getElementsByTagName("script")[0];
      s.src="https://cdn.iubenda.com/iubenda.js";
      tag.parentNode.insertBefore(s,tag);
    };
    if(w.addEventListener){ w.addEventListener("load", loader, false); }
    else if(w.attachEvent){ w.attachEvent("onload", loader); }
    else{ w.onload = loader; }
  })(window, document);
  </script>
</body>
</html>
